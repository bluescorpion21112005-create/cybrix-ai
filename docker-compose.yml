version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/pentestdb
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
      - ./reports:/app/reports
    depends_on:
      - db
      - redis
    networks:
      - pentest-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pentest-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=pentestdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pentest-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - pentest-network

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/pentestdb
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    networks:
      - pentest-network

volumes:
  postgres_data:

networks:
  pentest-network:
    driver: bridge