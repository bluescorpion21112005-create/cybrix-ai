<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .pricing-card {
            background: white;
            width: 320px;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .pricing-card h3 {
            margin-bottom: 15px;
            font-size: 24px;
            color: #111827;
        }

        .price {
            font-size: 32px;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 20px;
        }

        .price span {
            font-size: 16px;
            color: #6b7280;
        }

        .pricing-card ul {
            list-style: none;
            padding: 0;
            text-align: left;
            margin-bottom: 20px;
        }

        .pricing-card ul li {
            margin: 12px 0;
            font-size: 16px;
            color: #374151;
        }

        .pricing-card ul li i {
            color: #10b981;
            margin-right: 8px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            border: 2px solid #2563eb;
            color: #2563eb;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2563eb;
            color: white;
        }
    </style>
</head>
<body>

</body>
</html>
