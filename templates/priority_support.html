{% extends "base.html" %}

{% block content %}
<div class="container">
  <div class="card">
    <h1>Priority Support</h1>
    <p>Pro foydalanuvchilar uchun tezkor support oynasi.</p>

    <form method="post">
      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" class="form-control" placeholder="Muammo sarlavhasi">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" class="form-control"
          placeholder="Muammo yoki savolingizni yozing"></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Send Ticket</button>
    </form>
  </div>
</div>
{% endblock %}
