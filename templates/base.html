<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI Security Lab{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .flash-container { position:fixed; top:16px; right:16px; z-index:9999; max-width:360px; }
    .flash-msg {
      padding:12px 16px; border-radius:10px; margin-bottom:10px;
      font-size:.9rem; display:flex; align-items:center; gap:10px;
      backdrop-filter:blur(8px); animation:slideIn .3s ease;
    }
    .flash-danger  { background:rgba(239,68,68,.15);  border:1px solid #ef4444; color:#ef4444; }
    .flash-success { background:rgba(34,197,94,.15);  border:1px solid #22c55e; color:#22c55e; }
    .flash-warning { background:rgba(245,158,11,.15); border:1px solid #f59e0b; color:#f59e0b; }
    .flash-info    { background:rgba(59,130,246,.15); border:1px solid #3b82f6; color:#3b82f6; }
    @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
  </style>
</head>
<body>
  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
      <div class="flash-msg flash-{{ category }}">
        <i class="fas {% if category=='danger' %}fa-exclamation-circle
          {% elif category=='success' %}fa-check-circle
          {% elif category=='warning' %}fa-exclamation-triangle
          {% else %}fa-info-circle{% endif %}"></i>
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <script>
    // Auto-dismiss flash messages after 4 seconds
    setTimeout(() => {
      document.querySelectorAll('.flash-msg').forEach(el => {
        el.style.transition = 'opacity .4s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 400);
      });
    }, 4000);
  </script>
</body>
</html>
