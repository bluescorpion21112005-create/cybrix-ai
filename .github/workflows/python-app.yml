name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'   # daily at midnight (optional)

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'   # Use 3.12 – 3.13 is not yet supported by tokenizers

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "Installing minimal required packages..."
          pip install flask flask-sqlalchemy flask-login flask-wtf authlib openai scikit-learn numpy pandas transformers torch pefile scapy networkx tldextract requests pillow pytesseract speechrecognition python-magic
        fi

    - name: Check Python syntax (compile all .py files)
      run: |
        python -m compileall .

    - name: Basic import test (fail if app cannot be imported)
      env:
        SECRET_KEY: "test-secret-key"
        OPENAI_API_KEY: "dummy-key"
        FLASK_APP: app.py
      run: |
        python -c "import app"
        python -c "from models import *"