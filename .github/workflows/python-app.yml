name: Python kodini ishga tushirish

# Qachon ishga tushishi (trigger)
on:
  push:
    branches: [ "main" ]  # Kod "main" branchga yuborilganda
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'    # Har kuni yarim tunda avtomatik ishlash (ixtiyoriy)

jobs:
  build:
    runs-on: ubuntu-latest # Qaysi operatsion tizimda ishlashi

    steps:
    - name: Kodni yuklab olish (Checkout)
      uses: actions/checkout@v4

    - name: Pythonni o'rnatish
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Kutubxonalarni o'rnatish
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Python skriptni yugurtirish
      run: python app.py